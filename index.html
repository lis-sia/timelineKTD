<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === ОСНОВА СТРАНИЦЫ === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* === ОБЩАЯ ОБЁРТКА ДЛЯ СИНХРОННОГО СКРОЛЛА === */
        .main-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: visible;
        }

        /* === ПАНЕЛЬ С КНОПКАМИ ТРЕКОВ === */
        .top-nav {
            display: flex;
            flex-wrap: nowrap;
            gap: 0;
            margin: 0;
            padding: 10px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #ccc;
            box-sizing: border-box;
            width: max-content;
            min-width: 100%;
        }

        .top-nav button {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #06020a;
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 0;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .top-nav button:not(:last-child) {
            border-right: none;
        }

        .top-nav button.active {
            background-color: #8937f4;
            color: #fff;
        }

        .track-num {
            font-weight: bold;
            font-size: 1.3rem;
        }

        .track-name {
            white-space: nowrap;
        }

        /* === ОБЛАСТЬ С РАСПИСАНИЕМ === */
        .content-wrapper {
            margin: 0;
            padding: 20px;
            width: max-content;
            min-width: 100%;
        }

        /* === ЛИНИЯ ВРЕМЕНИ === */
        .timeline {
            position: relative;
            display: flex;
            align-items: stretch;
            min-width: max-content;
            margin: 125px 0; 
            padding: 0 20px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #0056b3;
            transform: translateY(-50%);
            z-index: 0;
        }

        /* === ОДНА КОЛОНКА СЕМЕСТРА === */
        .semester-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 0 0 auto;
            min-width: 200px;
            position: relative;
            z-index: 1;
        }

        /* === ВЕРХНИЕ И НИЖНИЕ ДИСЦИПЛИНЫ === */
        .disciplines-above,
        .disciplines-below {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex: 1;
            min-height: 0;
        }

        .disciplines-above {
            justify-content: flex-end;
            padding-bottom: 0px;
        }

        .disciplines-below {
            justify-content: flex-start;
            padding-top: 0px;
        }

        /* === СПИСОК ДИСЦИПЛИН === */
        .disciplines-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            list-style: none;
            padding: 0 5px;
            margin: 0;
            width: 100%;
        }

        .disciplines-list li {
            text-align: center;
            padding: 4px 8px;
            margin: 2px 0;
            font-size: 0.85rem;
            color: #333;
            word-break: break-word;
        }

        .disciplines-above .disciplines-list li {
            background-color: #e8f0fe;
            border: 1px solid #b0c4de;
            border-radius: 4px;
        }

        .disciplines-below .disciplines-list li {
            background-color: #f3e8ff;
            border: 1px solid #a855f7;
            border-radius: 4px;
        }

        /* === МАРКЕР СЕМЕСТРА === */
        .semester-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            flex-shrink: 0;
        }

        /* === КРУЖОК С НОМЕРОМ + ПОДПИСЬ === */
        .semester-number {
            display: inline-flex;
            flex-direction: column;     /* Цифра и подпись — вертикально */
            align-items: center;
            justify-content: center;
            width: 50px;                /* Чуть шире для текста */
            height: 50px;               /* Чуть выше */
            background-color: #0056b3;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.2rem;          /* Размер цифры */
            line-height: 1;             /* Без лишних отступов */
            box-shadow: 0 0 0 4px #f4f7f6;
        }

        /* === ПОДПИСЬ ПОД ЦИФРОЙ (сем.) === */
        .semester-label {
            font-size: 0.55rem;         /* Маленький текст */
            font-weight: normal;
            line-height: 1;
            margin-top: 1px;            /* Крошечный отступ от цифры */
        }

        /* === ЗАГЛУШКА === */
        .no-disciplines {
            color: #999;
            font-style: italic;
            padding: 5px;
            text-align: center;
        }

        #schedule-container {
            min-height: 300px;
        }

        @media (max-width: 768px) {
    
    /* Уменьшаем отступ сверху */
    .timeline {
        margin: 85px 0;
        padding: 0 10px;
    }

    /* Уменьшаем ширину колонки */
    .semester-column {
        min-width: 140px;          /* Было 200px — теперь уже */
    }

    /* Уменьшаем шрифт дисциплин */
    .disciplines-list li {
        font-size: 0.7rem;         /* Было 0.85rem */
        padding: 3px 5px;
        margin: 1px 0;
    }

    /* Уменьшаем кружок */
    .semester-number {
        width: 36px;
        height: 36px;
        font-size: 1rem;
    }

    /* Уменьшаем подпись */
    .semester-label {
        font-size: 0.45rem;
    }

    /* Уменьшаем отступы у маркера */
    .semester-marker {
        padding: 12px 0;           /* Было 20px */
    }

    /* Уменьшаем кнопки в панели */
    .top-nav {
        padding: 8px 10px;
    }

    .top-nav button {
        padding: 8px 10px;
        font-size: 0.8rem;
        gap: 5px;
    }

    .track-num {
        font-size: 1.1rem;
    }

    /* Уменьшаем отступы у контента */
    .content-wrapper {
        padding: 10px;
    }
}

/* === ДЛЯ ОЧЕНЬ МАЛЕНЬКИХ ЭКРАНОВ (телефоны) === */
@media (max-width: 480px) {
    
    .semester-column {
        min-width: 110px;          /* Ещё уже */
    }

    .disciplines-list li {
        font-size: 0.65rem;
        padding: 2px 4px;
    }

    .semester-number {
        width: 30px;
        height: 30px;
        font-size: 0.85rem;
    }

    .semester-label {
        font-size: 0.4rem;
    }

    .semester-marker {
        padding: 10px 0;
    }

    /* Совсем компактные кнопки */
    .top-nav button {
        padding: 6px 8px;
        font-size: 0.7rem;
        gap: 3px;
    }

    .track-num {
        font-size: 0.9rem;
    }
}
    </style>
</head>
<body>

    <!-- === ПЕРЕКЛЮЧАТЕЛЬ ГОДОВ (НОВОЕ) === -->
    <div class="year-switcher">
        <label for="year-select">Год обучения:</label>
        <select id="year-select">
            <option value="schedule-2025.json">2025</option>
            <option value="schedule-2026.json">2026</option>
            <!-- Добавьте ещё годы по аналогии -->
            <!-- <option value="schedule-2026.json">2026</option> -->
        </select>
    </div>

    <div class="main-wrapper">

        <!-- === КНОПКИ ВЫБОРА ТРЕКА === -->
        <nav class="top-nav" id="track-nav">
            <button data-track="track1">
                <span class="track-num">1.</span>
                <span class="track-name">Дизайн компьютерных игр</span>
            </button>
            <button data-track="track2">
                <span class="track-num">2.</span>
                <span class="track-name">3D-визуализация</span>
            </button>
            <button data-track="track3">
                <span class="track-num">3.</span>
                <span class="track-name">Дизайн графических интерфейсов</span>
            </button>
            <button data-track="track4">
                <span class="track-num">4.</span>
                <span class="track-name">Разработка графических и веб-приложений</span>
            </button>
            <button data-track="track5">
                <span class="track-num">5.</span>
                <span class="track-name">Анимация и развивающие приложения</span>
            </button>
        </nav>

        <!-- === ОСНОВНОЙ КОНТЕНТ === -->
        <div class="content-wrapper">
            <div id="schedule-container">Пожалуйста, выберите трек для отображения расписания.</div>
        </div>

    </div>

    <!-- === ЛОГИКА (JavaScript) === -->
    <script>
        let scheduleData = {};       // Данные текущего года
        let currentTrackId = 'track1'; // Какой трек сейчас показан

        // === 1. ЗАГРУЗКА ДАННЫХ ПРИ СМЕНЕ ГОДА ===
        function loadYear(filename) {
            fetch(filename)
                .then(response => response.json())
                .then(data => {
                    scheduleData = data;              // Сохраняем новые данные
                    showTrack(currentTrackId);        // Перерисовываем текущий трек
                })
                .catch(error => {
                    document.getElementById('schedule-container').innerText = 
                        'Ошибка загрузки данных для выбранного года.';
                    console.error('Ошибка:', error);
                });
        }

        // === 2. ФУНКЦИЯ ОТРИСОВКИ ТРЕКА (без изменений) ===
        function showTrack(trackId) {
            currentTrackId = trackId;                 // Запоминаем выбранный трек
            
            const track = scheduleData[trackId];
            if (!track) {
                document.getElementById('schedule-container').innerText = 'Трек не найден.';
                return;
            }

            const container = document.getElementById('schedule-container');
            
            if (!track.semesters || track.semesters.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">Расписание для этого трека пока не добавлено.</p>';
                return;
            }

            let html = '<div class="timeline">';
            track.semesters.forEach(sem => {
                html += '<div class="semester-column">';
                
                // Верхние дисциплины
                html += '<div class="disciplines-above">';
                if (sem.disciplines_above && sem.disciplines_above.length > 0) {
                    html += '<ul class="disciplines-list">';
                    sem.disciplines_above.forEach(d => html += `<li>${d}</li>`);
                    html += '</ul>';
                } else {
                    html += '<div class="no-disciplines">—</div>';
                }
                html += '</div>';
                
                // Кружок с номером и подписью "сем."
                html += `<div class="semester-marker">
                            <span class="semester-number">
                                ${sem.sem}
                                <span class="semester-label">сем.</span>
                            </span>
                         </div>`;
                
                // Нижние дисциплины
                html += '<div class="disciplines-below">';
                if (sem.disciplines_below && sem.disciplines_below.length > 0) {
                    html += '<ul class="disciplines-list">';
                    sem.disciplines_below.forEach(d => html += `<li>${d}</li>`);
                    html += '</ul>';
                } else {
                    html += '<div class="no-disciplines">—</div>';
                }
                html += '</div></div>';
            });
            html += '</div>';
            
            container.innerHTML = html;

            // Подсветка активной кнопки трека
            document.querySelectorAll('.top-nav button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`[data-track="${trackId}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        // === 3. ПЕРЕКЛЮЧАТЕЛЬ ГОДОВ ===
        document.getElementById('year-select').addEventListener('change', function() {
            loadYear(this.value);                     // Загружаем выбранный год
        });

        // === 4. КЛИКИ ПО КНОПКАМ ТРЕКОВ ===
        document.querySelectorAll('.top-nav button').forEach(button => {
            button.addEventListener('click', function() {
                showTrack(this.getAttribute('data-track'));
            });
        });

        // === 5. ПЕРВЫЙ ЗАПУСК — загружаем 2025 год (выбран по умолчанию) ===
        loadYear('schedule-2025.json');
    </script>
</body>
</html>
